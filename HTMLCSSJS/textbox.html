<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>



<div
  class="
    relative 
    grid 
    min-h-screen 
    grid-cols-[1fr_2.5rem_auto_2.5rem_1fr] 
    grid-rows-[1fr_1px_auto_1px_1fr] 
    bg-white [--pattern-fg:var(--color-gray-950)]/5 
    dark:bg-gray-950 
    dark:[--pattern-fg:var(--color-white)]/10"
>
  <div
    class="
        col-start-3
        row-start-3
        flex max-w-lg
        flex-col 
        bg-gray-100 
        p-2 
        dark:bg-white/10"
  >
    <div
      class="
        relative
        grid
        grid-cols-[2.5rem_auto_2.5rem]
        grid-rows-[auto_auto_auto_auto_auto] 
        rounded-xl
        bg-white
        p-10
        text-sm/7 
        text-gray-700 
        dark:bg-gray-950 
        dark:text-gray-300"
    >
        <!-- コンテナ1 -->
        <!-- flex	フレックスコンテナにする
        flex-col	子要素を縦方向に並べる（flex-direction: column）
        gap-1	子要素間に均等なスペースを入れる -->
      <div class="
        col-start-2
        row-start-1
        flex
        flex-col
        gap-1
        mb-4
        ">
        <label class="font-semibold text-white">タイトル1</label>
        <input type="text"class="
            rounded-md
            border
            border-gray-300
            px-3
            py-2
            dark:bg-gray-800
            dark:border-gray-600
        " />
      </div>
      <div class="col-start-2 row-start-2 mb-4">
        <button class="w-full rounded-md bg-blue-600 px-4 py-2 text-white hover:bg-blue-700">ボタン1</button>
      </div>

      <div class="
        col-start-2
        row-start-3
        flex
        flex-col
        gap-1
        mb-4
        ">
        <label class="font-semibold text-white">タイトル2</label>
        <input type="text"class="
            rounded-md
            border
            border-gray-300
            px-3
            py-2
            dark:bg-gray-800
            dark:border-gray-600
        " />
      </div>

      <div class="
        col-start-2
        row-start-5
        flex
        flex-col
        gap-1
        mb-4
        ">
        <label class="font-semibold text-white">タイトル3</label>
        <input type="text"class="
            rounded-md
            border
            border-gray-300
            px-3
            py-2
            dark:bg-gray-800
            dark:border-gray-600
        " />
      </div>
      <div class="col-start-2 row-start-6 mb-4">
        <button class="w-full rounded-md bg-blue-600 px-4 py-2 text-white hover:bg-blue-700">ボタン3</button>
      </div>


    </div>
  </div>
  <div
    class="relative -right-px col-start-2 row-span-full row-start-1 border-x border-x-(--pattern-fg) bg-[image:repeating-linear-gradient(315deg,_var(--pattern-fg)_0,_var(--pattern-fg)_1px,_transparent_0,_transparent_50%)] bg-[size:10px_10px] bg-fixed"
  ></div>
  <div
    class="relative -left-px col-start-4 row-span-full row-start-1 border-x border-x-(--pattern-fg) bg-[image:repeating-linear-gradient(315deg,_var(--pattern-fg)_0,_var(--pattern-fg)_1px,_transparent_0,_transparent_50%)] bg-[size:10px_10px] bg-fixed"
  ></div>
  <div
    class="relative -bottom-px col-span-full col-start-1 row-start-2 h-px bg-(--pattern-fg)"
  ></div>
  <div
    class="relative -top-px col-span-full col-start-1 row-start-4 h-px bg-(--pattern-fg)"
  ></div>
</div>
