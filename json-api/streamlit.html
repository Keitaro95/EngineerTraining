    <link

    <style>
      body {
        background: #0e1117;
      }
      /* JSON viewer */
      .json-tree {
        font-family: "Source Code Pro", monospace;
        font-size: 12px;
        line-height: 1.6;
      }
      .json-key {
        color: #93c5fd;
      }
      .json-string {
        color: #6ee7b7;
      }
      .json-number {
        color: #fbbf24;
      }
      .json-bool {
        color: #a78bfa;
      }
      .json-null {
        color: #f87171;
        font-style: italic;
      }
      .json-bracket {
        color: #6b7280;
      }
      .json-toggle {
        cursor: pointer;
        user-select: none;
      }
      .json-toggle::before {
        content: "▾";
        display: inline-block;
        width: 16px;
        color: #6b7280;
        font-size: 10px;
        transition: transform 0.15s;
      }
      .json-toggle.collapsed::before {
        transform: rotate(-90deg);
      }
      .json-hidden {
        display: none;
      }
      .json-ellipsis {
        color: #6b7280;
        font-style: italic;
        font-size: 11px;
        display: none;
      }
      .json-toggle.collapsed + .json-ellipsis {
        display: inline;
      }

      /* Expander animation */
      .expander-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .expander-body.open {
        max-height: 4000px;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #2e3444;
        border-radius: 3px;
      }

      /* Toast */
      .toast {
        animation:
          toastIn 0.3s ease,
          toastOut 0.3s ease 2.7s forwards;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes toastOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
